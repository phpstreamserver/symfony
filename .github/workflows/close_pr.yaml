name: Close Pull Request

on:
  pull_request_target:
    types: [opened]

jobs:
  close:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
        - name: Close Pull Request
          run: gh pr close "${{ github.event.number }}" --repo "${{ github.repository }}" --comment "$COMMENT"
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            COMMENT: |
              Thank you for your pull request.
              This repository is a read-only split of `phpstreamserver/phpstreamserver` and does not accept pull requests.
              Please submit your pull request to the main repository instead:
              https://github.com/phpstreamserver/phpstreamserver
